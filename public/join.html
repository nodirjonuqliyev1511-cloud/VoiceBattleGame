<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Voice Battle — участник</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="stylesheet" href="/style.css">
<script src="/socket.io/socket.io.js"></script>
<style>
  .screen { min-height: 100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 24px; text-align:center; }
  .logo { font-size: 30px; margin-bottom: 6px; }
  .logo .hot { color: var(--hot-magenta); }
  .logo .cyan { color: var(--electric-cyan); }

  .field { width: 100%; max-width: 300px; margin: 10px 0; }

  #waitScreen .pulse {
    width: 90px; height: 90px; border-radius: 50%; margin: 20px auto;
    background: var(--stage-black-2); border: 2px solid var(--hot-magenta);
    display:flex; align-items:center; justify-content:center; font-size: 34px;
    animation: breathe 1.6s ease-in-out infinite;
  }
  @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }

  #countdownScreen { display:none; }
  .cd-num { font-size: 140px; color: var(--warn-yellow); }

  #battleScreen { display:none; width:100%; }
  .timer-pill {
    display:inline-block; background: var(--stage-black-2); border:1px solid var(--line);
    border-radius: 999px; padding: 6px 18px; font-weight:800; color: var(--warn-yellow); margin-bottom: 14px;
  }
  .speedo {
    width: 100%; max-width: 360px; height: 340px; margin: 0 auto;
    background: linear-gradient(180deg, #1a1c26 0%, #0a0b10 100%);
    border-radius: 24px; border: 1px solid var(--line);
    position: relative; overflow:hidden; display:flex; flex-direction:column; justify-content:flex-end;
  }
  .speedo::before {
    content:''; position:absolute; inset:0;
    background-image: repeating-linear-gradient(180deg, transparent 0 34px, rgba(255,255,255,0.08) 34px 44px);
  }
  .speedo-glow {
    position:absolute; bottom:0; left:0; right:0; height: 0%;
    background: linear-gradient(0deg, rgba(255,46,99,0.10), rgba(8,217,214,0.20) 55%, rgba(255,210,63,0.32));
    transition: height 0.08s linear;
  }
  .speedo-car { position:relative; width: 78%; margin: 0 auto 4px; transition: transform 0.08s ease-out; z-index:2; }
  .speedo-car svg, .speedo-car img { width: 100%; height: auto; filter: drop-shadow(0 10px 14px rgba(0,0,0,0.6)); }
  .speedo-value { position:relative; font-family:'Anton',sans-serif; font-size: 46px; z-index:2; padding-bottom: 20px; }
  .speedo-unit { font-size: 14px; color: var(--muted); font-family:'Inter',sans-serif; }
  .my-gauge { position:relative; width: 150px; height: 82px; margin: 10px auto 0; z-index:2; }
  .my-gauge svg { position:absolute; inset:0; width:100%; height:100%; }
  .my-gauge-needle {
    position:absolute; left:50%; bottom:4px; width:5px; height:60px; margin-left:-2.5px;
    background: linear-gradient(180deg, #ff2e63 0%, #ff2e63 16%, #f2f2f2 28%, #f2f2f2 100%);
    border-radius: 3px 3px 1px 1px;
    transform-origin: bottom center; transform: rotate(-90deg);
    transition: transform 0.1s ease-out; box-shadow: 0 0 10px rgba(255,255,255,0.7);
  }
  .my-gauge-pivot {
    position:absolute; left:50%; bottom:1px; width:17px; height:17px; margin-left:-8.5px;
    border-radius:50%; background: radial-gradient(circle at 35% 30%, #f5f5f5, #9a9da3 55%, #3a3c40 100%);
    box-shadow: 0 0 8px rgba(0,0,0,0.6), 0 0 5px rgba(255,255,255,0.4);
  }

  #resultsScreen { display:none; }
  .place-big { font-size: 90px; color: var(--warn-yellow); }
</style>
</head>
<body>
<div class="screen">

  <div id="joinScreen">
    <div class="logo display"><span class="hot">VOICE</span> <span class="cyan">BATTLE</span></div>
    <div style="color:var(--muted); font-size:15px;">Введи код комнаты и своё имя</div>
    <input type="text" id="roomInput" class="field" placeholder="КОД КОМНАТЫ" maxlength="6" autocomplete="off" style="text-transform:uppercase; letter-spacing:0.1em;">
    <input type="text" id="nameInput" class="field" placeholder="Твоё имя" maxlength="20" autocomplete="off">
    <button class="btn-primary" id="joinBtn">ПРИСОЕДИНИТЬСЯ</button>
    <div id="errorText" style="color:var(--hot-magenta); font-size:13px; margin-top:14px; max-width:280px;"></div>
  </div>

  <div id="waitScreen" style="display:none;">
    <div class="logo display"><span class="cyan">ТЫ В ИГРЕ</span></div>
    <div class="pulse">🎤</div>
    <div style="color:var(--muted);">Жди, пока ведущий начнёт баттл…</div>
  </div>

  <div id="countdownScreen">
    <div class="eyebrow">ПРИГОТОВЬСЯ</div>
    <div class="cd-num display" id="cdNum">3</div>
  </div>

  <div id="battleScreen">
    <div class="timer-pill" id="timerPill">0:00</div>
    <div class="eyebrow" style="margin-bottom:10px;">ОРИ КАК МОЖНО ГРОМЧЕ!</div>
    <div class="speedo">
      <div class="speedo-glow" id="speedoGlow"></div>
      <div class="speedo-car" id="speedoCar"></div>
      <div class="my-gauge">
        <svg viewBox="0 0 120 66" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="my-gg" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#4fd675"/>
              <stop offset="45%" stop-color="#ffd23f"/>
              <stop offset="100%" stop-color="#ff2e63"/>
            </linearGradient>
          </defs>
          <path d="M6,58 A54,54 0 0 1 114,58" stroke="#08080c" stroke-width="12" fill="none" stroke-linecap="round"/>
          <path d="M10,58 A50,50 0 0 1 110,58" stroke="#1c1d26" stroke-width="9" fill="none" stroke-linecap="round"/>
          <path d="M10,58 A50,50 0 0 1 110,58" stroke="url(#my-gg)" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.95"/>
          <g stroke="#9a9ea6" stroke-width="1.6" stroke-linecap="round">
            <line x1="10" y1="58" x2="19" y2="58"/>
            <line x1="24.64" y1="22.64" x2="31" y2="29"/>
            <line x1="60" y1="8" x2="60" y2="17"/>
            <line x1="95.36" y1="22.64" x2="89" y2="29"/>
            <line x1="110" y1="58" x2="101" y2="58"/>
          </g>
        </svg>
        <div class="my-gauge-needle" id="myNeedle"></div>
        <div class="my-gauge-pivot"></div>
      </div>
      <div class="speedo-value" id="speedoValue">0<span class="speedo-unit"> дБ</span></div>
    </div>
  </div>

  <div id="resultsScreen">
    <div class="eyebrow">ФИНИШ</div>
    <div class="place-big display" id="placeBig">-</div>
    <div style="color:var(--muted); font-size:14px; margin-top:10px;">место в баттле</div>
    <div style="color:var(--electric-cyan); font-size:20px; margin-top:10px; font-weight:800;" id="myPeak"></div>
    <div style="color:var(--muted); font-size:15px; margin-top:6px;" id="myDistance"></div>
    <div style="color:var(--muted); font-size:13px; margin-top:18px;">Смотри полный результат на экране ведущего</div>
  </div>

</div>

<script>
const VEHICLE_IMAGES = {
  tractor: '/img/tractor.png',
  coupe: '/img/coupe.png',
  classic: '/img/classic.png',
  suv: '/img/suv.png'
};
function vehicleImg(type, extraStyle) {
  const src = VEHICLE_IMAGES[type] || VEHICLE_IMAGES.coupe;
  return `<img src="${src}" alt="${type}" style="${extraStyle || ''}">`;
}

const socket = io();
let audioCtx, analyser, micStream, rafId, myCarColor = '#08d9d6', myVehicleType = 'coupe';

const screens = ['joinScreen','waitScreen','countdownScreen','battleScreen','resultsScreen'];
function show(id) {
  screens.forEach(s => document.getElementById(s).style.display = (s === id ? 'block' : 'none'));
}

const params = new URLSearchParams(location.search);
const prefillRoom = params.get('room');
if (prefillRoom) document.getElementById('roomInput').value = prefillRoom.toUpperCase();

async function setupMic() {
  micStream = await navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
  });
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioCtx.createMediaStreamSource(micStream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  source.connect(analyser);
}

function getRms() {
  const data = new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(data);
  let sumSquares = 0;
  for (let i = 0; i < data.length; i++) {
    const v = (data[i] - 128) / 128;
    sumSquares += v * v;
  }
  return Math.sqrt(sumSquares / data.length);
}

const SCORE_MIN = 0, SCORE_MAX = 100;
const RMS_DB_FLOOR = -50, RMS_DB_CEIL = -5;
function rmsToScore(rms) {
  const safeRms = Math.max(rms, 0.000001);
  const db = 20 * Math.log10(safeRms);
  const pct = ((db - RMS_DB_FLOOR) / (RMS_DB_CEIL - RMS_DB_FLOOR)) * 100;
  return Math.max(0, Math.min(100, pct));
}
function scoreToPercent(score) {
  return Math.max(0, Math.min(100, score));
}

document.getElementById('joinBtn').addEventListener('click', async () => {
  const roomCode = document.getElementById('roomInput').value.trim().toUpperCase();
  const name = document.getElementById('nameInput').value.trim() || 'Игрок';
  const errEl = document.getElementById('errorText');
  errEl.textContent = '';

  if (!roomCode) {
    errEl.textContent = 'Введи код комнаты';
    return;
  }

  try {
    await setupMic();
  } catch (e) {
    errEl.textContent = 'Не удалось получить доступ к микрофону. Разреши доступ в браузере и попробуй снова.';
    return;
  }

  socket.emit('joinRoom', { roomCode, playerName: name });
});

socket.on('joinSuccess', ({ carColor, vehicleType }) => {
  myCarColor = carColor || myCarColor;
  myVehicleType = vehicleType || myVehicleType;
  document.getElementById('speedoCar').innerHTML = vehicleImg(myVehicleType);
  show('waitScreen');
});

socket.on('joinError', (msg) => {
  document.getElementById('errorText').textContent = msg;
});

socket.on('countdown', (seconds) => {
  show('countdownScreen');
  let n = seconds;
  document.getElementById('cdNum').textContent = n;
  const iv = setInterval(() => {
    n -= 1;
    if (n <= 0) { clearInterval(iv); return; }
    document.getElementById('cdNum').textContent = n;
  }, 1000);
});

let myStopwatch = null;

socket.on('battleStarted', () => {
  show('battleScreen');

  let elapsed = 0;
  document.getElementById('timerPill').textContent = '0:00';
  if (myStopwatch) clearInterval(myStopwatch);
  myStopwatch = setInterval(() => {
    elapsed += 1;
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    document.getElementById('timerPill').textContent = m + ':' + String(s).padStart(2, '0');
  }, 1000);

  function tick() {
    const rms = getRms();
    socket.emit('volume', rms);

    const score = rmsToScore(rms);
    const pct = scoreToPercent(score);
    document.getElementById('speedoGlow').style.height = pct + '%';
    document.getElementById('speedoCar').style.transform = `scale(${0.92 + pct / 100 * 0.22})`;
    document.getElementById('speedoValue').innerHTML = Math.max(0, Math.round(score)) + '<span class="speedo-unit"> дБ</span>';
    const needleAngle = -90 + (pct / 100) * 180;
    document.getElementById('myNeedle').style.transform = `rotate(${needleAngle}deg)`;

    rafId = requestAnimationFrame(tick);
  }
  tick();
});

socket.on('battleOver', (results) => {
  cancelAnimationFrame(rafId);
  if (myStopwatch) { clearInterval(myStopwatch); myStopwatch = null; }
  show('resultsScreen');
  const mine = results.find(r => r.id === socket.id);
  document.getElementById('placeBig').textContent = mine ? mine.place : '-';
  document.getElementById('myPeak').textContent = mine ? `Пик: ${Math.max(0, Math.round(mine.peakScore))} дБ` : '';
  document.getElementById('myDistance').textContent = mine ? `Проехал: ${(mine.totalDistanceKm || 0).toFixed(2)} км` : '';
});

socket.on('backToLobby', () => {
  cancelAnimationFrame(rafId);
  show('waitScreen');
});
</script>
</body>
</html>
